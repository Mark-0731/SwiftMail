global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'swiftmail-api'
    static_configs:
      - targets: ['host.docker.internal:9091']
    metrics_path: '/metrics'

  - job_name: 'swiftmail-worker'
    static_configs:
      - targets: ['host.docker.internal:9092']
    metrics_path: '/metrics'
